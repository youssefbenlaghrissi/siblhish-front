name: siblhish_front
description: Application moderne de gestion de budget
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Animations
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  
  # Charts
  fl_chart: ^1.1.1
  
  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  
  # HTTP Client
  http: ^1.1.0
  
  # Authentication
  google_sign_in: ^6.2.1
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Firebase & Push Notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^18.0.1
  
  # Permissions (pour redemander les permissions même si refusées)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/
    - assets/images/

# Configuration pour générer les icônes de l'application
flutter_launcher_icons:
  android: true
  ios: true  # Support iOS activé
  image_path: "assets/icons/splash-icon.png"  # Icône de l'application
  remove_alpha_ios: true  # Supprimer le canal alpha pour iOS (requis pour App Store)

